services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      args:
        # Picked up from the host environment; empty on normal networks.
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    environment:
      TASKFLOW_DATABASE_URL: postgresql+psycopg://taskflow:taskflow@db:5432/taskflow
      TASKFLOW_JWT_SECRET: local-dev-secret-do-not-use-in-prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log"

volumes:
  pgdata:
